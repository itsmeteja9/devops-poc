name: CI Pipeline

on:
  push:
    branches:
      - dev
      - test
      - 'feature/*'
  pull_request:
    branches:
      - dev
      - test
      - 'feature/*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
